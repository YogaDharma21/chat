info:
  name: Reset Password
  type: http
  seq: 4

http:
  method: PUT
  url: "{{BACKEND_URL}}/api/auth/reset-password/{{TOKEN_RESET_PASSWORD}}"
  body:
    type: json
    data: |-
      {
        "password":"testtesttest",
        "confirmPassword":"testtesttest"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Get Email Reset Response
    request:
      url: "{{BACKEND_URL}}/api/auth/reset-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "email":"test@test.test"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: x-powered-by
          value: Express
        - name: access-control-allow-origin
          value: "*"
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "58"
        - name: etag
          value: W/"3a-NW3FI6tvE3yPGW4kCfJp3nSltjo"
        - name: date
          value: Wed, 03 Jun 2026 07:55:07 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Reset email sent successfully"
          }
