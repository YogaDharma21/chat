info:
  name: Get Email Reset
  type: http
  seq: 1

http:
  method: POST
  url: "{{BACKEND_URL}}/api/auth/reset-password"
  body:
    type: json
    data: |-
      {
        "email": "test@test.test"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
