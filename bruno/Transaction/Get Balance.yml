info:
  name: Get Balance
  type: http
  seq: 3

http:
  method: GET
  url: "{{BACKEND_URL}}/api/balance"
  headers:
    - name: Authorization
      value: JWT {{JWT_TOKEN}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Get Balance Success
    request:
      url: "{{BACKEND_URL}}/api/balance"
      method: GET
      headers:
        - name: Authorization
          value: JWT {{JWT_TOKEN}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: x-powered-by
          value: Express
        - name: access-control-allow-origin
          value: "*"
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "61"
        - name: etag
          value: W/"3d-sJ9iPSWh/Dr+fSNmS1l2w1q4Ths"
        - name: date
          value: Wed, 22 Jul 2026 00:53:20 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Success get balance",
            "data": 25000
          }
